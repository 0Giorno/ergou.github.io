<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">了不起的盖茨比封面</title>
  <desc id="desc">Inspired by The Great Gatsby, with blue night, city lights and green light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07152d"/>
      <stop offset="0.55" stop-color="#10284a"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="greenLight" cx="50%" cy="38%" r="44%">
      <stop offset="0" stop-color="#a8ffbf" stop-opacity="0.95"/>
      <stop offset="0.18" stop-color="#55f08a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#55f08a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="1040" rx="18" fill="url(#bg)"/>
  <rect x="34" y="34" width="652" height="972" rx="10" fill="none" stroke="#d8b968" stroke-width="5"/>
  <rect x="56" y="56" width="608" height="928" rx="6" fill="none" stroke="#d8b968" stroke-width="1.8" opacity="0.6"/>

  <circle cx="360" cy="360" r="250" fill="url(#greenLight)"/>
  <circle cx="360" cy="305" r="15" fill="#b9ffcb" filter="url(#glow)"/>
  <path d="M338 331 C352 343 368 343 382 331" fill="none" stroke="#b9ffcb" stroke-width="4" opacity="0.85"/>

  <g opacity="0.78" fill="#f4d98a">
    <rect x="92" y="742" width="34" height="138"/>
    <rect x="142" y="700" width="44" height="180"/>
    <rect x="204" y="770" width="38" height="110"/>
    <rect x="268" y="720" width="52" height="160"/>
    <rect x="346" y="680" width="36" height="200"/>
    <rect x="410" y="754" width="48" height="126"/>
    <rect x="486" y="706" width="42" height="174"/>
    <rect x="550" y="760" width="54" height="120"/>
  </g>
  <g fill="#0b1020" opacity="0.55">
    <rect x="98" y="756" width="8" height="14"/><rect x="114" y="756" width="8" height="14"/>
    <rect x="152" y="720" width="8" height="14"/><rect x="172" y="720" width="8" height="14"/>
    <rect x="280" y="740" width="9" height="16"/><rect x="302" y="740" width="9" height="16"/>
    <rect x="356" y="704" width="8" height="16"/><rect x="370" y="704" width="8" height="16"/>
    <rect x="500" y="724" width="8" height="14"/><rect x="516" y="724" width="8" height="14"/>
  </g>

  <text x="360" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#f2d27b" letter-spacing="8">THE GREAT</text>
  <text x="360" y="238" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#f8e6a5" letter-spacing="6">GATSBY</text>
  <line x1="172" y1="276" x2="548" y2="276" stroke="#d8b968" stroke-width="3" opacity="0.8"/>

  <text x="360" y="600" text-anchor="middle" font-family="'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif" font-size="58" font-weight="700" fill="#f8e6a5">了不起的盖茨比</text>
  <text x="360" y="662" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#d8b968" letter-spacing="2">F. Scott Fitzgerald</text>
  <text x="360" y="928" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#f2d27b" opacity="0.9">A NOTE ON DREAMS, LOVE AND THE GREEN LIGHT</text>
</svg>
